<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="100" y1="30" x2="100" y2="174" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#EBF7EF"/>
      <stop offset="48%"  stop-color="#9ECBAD"/>
      <stop offset="100%" stop-color="#4A8766"/>
    </linearGradient>
    <clipPath id="bg">
      <rect width="200" height="200" rx="40"/>
    </clipPath>
  </defs>

  <!-- Dark green background -->
  <rect width="200" height="200" rx="40" fill="#0D2318"/>

  <!-- W mark: 3 arched pillars with deep organic valleys -->
  <!--
    Arch 1 (left):  x=14→100, radius=43, top y=32
    Valley 1:       S-curve (100,110)→(66,110) dipping to ~y=148
    Arch 2 (mid):   x=66→152, radius=43, top y=32
    Valley 2:       S-curve (152,110)→(118,110) dipping to ~y=148
    Arch 3 (right): x=118→188, radius=35, top y=40 (slightly narrower)
  -->
  <path
    d="
      M 14,174
      L 14,75
      A 43 43 0 0 0 100,75
      L 100,110
      C 100,158 66,158 66,110
      L 66,75
      A 43 43 0 0 0 152,75
      L 152,110
      C 152,158 118,158 118,110
      L 118,75
      A 35 35 0 0 0 188,75
      L 188,174
      Z
    "
    fill="url(#g)"
    clip-path="url(#bg)"
  />
</svg>
