<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="100" y1="58" x2="100" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F0F6F2"/>
      <stop offset="35%"  stop-color="#B0D8BF"/>
      <stop offset="100%" stop-color="#3A7852"/>
    </linearGradient>
    <clipPath id="bg">
      <rect width="200" height="200" rx="36"/>
    </clipPath>
  </defs>

  <rect width="200" height="200" rx="36" fill="#0D2218"/>

  <!--
    Perfect semicircles: rx = ry = half the arch width.
    This ensures "full radius / 50% curvature" at arch tops — no pointy or flat crowns.

    Left arch:   x=14→90,  width=76, radius=38  → top y=96-38=58
    Valley 1:    Bézier S-curve from (90,96) to (76,96) dipping to ~y=139
    Middle arch: x=76→146, width=70, radius=35  → top y=96-35=61
    Valley 2:    Bézier S-curve from (146,96) to (132,96) dipping to ~y=139
    Right arch:  x=132→186, width=54, radius=27 → top y=96-27=69
    Bottom: flat y=172
  -->
  <path
    d="
      M 14,172
      L 14,96
      A 38 38 0 0 0 90,96
      C 90,153 76,153 76,96
      A 35 35 0 0 0 146,96
      C 146,153 132,153 132,96
      A 27 27 0 0 0 186,96
      L 186,172
      Z
    "
    fill="url(#g)"
    clip-path="url(#bg)"
  />
</svg>
